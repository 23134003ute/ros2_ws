# Lidar 1 (Front)
- ros_topic_name: "/scan_1"
  gz_topic_name: "/scan_front_raw"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
  lazy: false


# Lidar 2 (Rear)
- ros_topic_name: "/scan_2"
  gz_topic_name: "/scan_rear_raw"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
  lazy: false


- ros_topic_name: "/imu"
  gz_topic_name: "/base_imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.Imu"
  direction: GZ_TO_ROS
  lazy: false
  
# Odometry (Kiểm tra kỹ tên model 'omni_robot')
# Clock
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Odometry from Gazebo
- ros_topic_name: "/odom"
  gz_topic_name: "/model/omni_base/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
  lazy: false
